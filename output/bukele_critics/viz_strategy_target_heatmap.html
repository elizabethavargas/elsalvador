<script>
(function() {
  const TWEETS = {"(no specific strategy)": {"\"Comunidad Internacional\"": [{"date": "2023-03-07", "text": "¿Cuántas décadas más, llenas de decenas de miles de muertos, deberíamos de haber aguantado los salvadoreños, para que las recetas de las ONGs y la “comunidad internacional”, comenzaran a funcionar?", "likes": 57431, "retweets": 10471}, {"date": "2021-05-02", "text": "A nuestros amigos de la Comunidad Internacional:  Queremos trabajar con ustedes, comerciar, viajar, conocernos y ayudar en lo que podamos.  Nuestras puertas están más abiertas que nunca.  Pero con todo respeto:  Estamos limpiando nuestra casa.  ...y eso no es de su incumbencia.", "likes": 32646, "retweets": 6337}, {"date": "2020-02-09", "text": "A la Comunidad Internacional:  El Salvador está dominado por los bandos de la guerra civil, esos dos bandos continúan con la corrupción y negocian con grupos crimínales. Hay videos de ellos negociando vidas a cambio de votos. El pueblo ya se cansó y el Presidente está con ellos.", "likes": 21108, "retweets": 4252}, {"date": "2022-11-25", "text": "Ante la hipocresía de algunos en la “comunidad internacional”…  Replying to the hypocrisy of some in the “international community”… https://t.co/cCTSixE6GN", "likes": 14193, "retweets": 3968}, {"date": "2024-01-03", "text": "Cuando se inauguró el monumento a los asesinos del pueblo, nuestro país vivía en perfecta democracia, no había dictadura, había independencia de poderes e institucionalidad democrática; la izquierda y la derecha trabajaban de la mano. Todas las fuerzas vivas del país, junto a la sociedad civil y las ONGs, nos tenían viviendo en un paraíso terrenal.  Mientras tanto, toda la comunidad internacional, al unísono, apoyaba esta realidad; tanto así, que cuando quisimos cambiarla nos condenaron, sancionaron y demandaron que “regresaremos todo, a su estado anterior”.  Gracias a Dios no lo hicimos y, bueno, ahora El Salvador es otro país.  Adiós, muñeca azul, y todo lo que representabas.", "likes": 11703, "retweets": 2192}, {"date": "2019-06-04", "text": "En próximos días, anunciaremos nuevos donativos de ONGs y de la Comunidad Internacional que, al igual que la gran mayoría de salvadoreños, queremos ver a nuestro país salir adelante.", "likes": 7697, "retweets": 811}, {"date": "2022-07-14", "text": "Los terroristas que emboscaron y asesinaron a nuestro héroe con tácticas guerrilleras, son los que defienden algunos en la “comunidad internacional” y las mal llamadas “ONGs de derechos humanos”.  Al mismo tiempo, la oposición pide dinero para “indemnizarlos”.  Cínicos.", "likes": 7563, "retweets": 1297}, {"date": "2022-01-16", "text": "Los que quieran celebrar ese acuerdo espurio, háganlo, este es un país libre; pero ya no será una fiesta nacional.  Y a los de la “Comunidad Internacional” que casi demandan su celebración: no se metan.  Nosotros no cuestionamos por qué ustedes no celebran partes de su historia.", "likes": 5963, "retweets": 1238}, {"date": "2022-03-05", "text": "Por supuesto que no lo haríamos, nosotros sí creemos en la libertad de expresión y en la libertad de prensa, pero es importante mostrar la hipocresía de la llamada “comunidad internacional”, quienes nos condenarían ferozmente si hiciéramos EXACTAMENTE lo mismo que ellos hacen.", "likes": 5685, "retweets": 938}, {"date": "2021-02-07", "text": "Estarían formando comisiones, publicando condenas, quejándose con la comunidad internacional y poniendo el grito en el cielo.  Por suerte ya nadie les cree. Y si alguien aún les cree, vea este video y compruebe quiénes son los del discurso de muerte.  @HouseForeign, @SecBlinken", "likes": 4906, "retweets": 842}, {"date": "2020-02-25", "text": "Espero de corazón que la comunidad internacional logre contener este virus y que los científicos logren encontrar una vacuna lo más rápido posible.", "likes": 4514, "retweets": 522}, {"date": "2019-04-12", "text": "Con el Cuerpo Diplomático acreditado en nuestro país. Dándoles el mensaje de que es hora de que la comunidad internacional ponga sus ojos en El Salvador.  El Salvador será un ejemplo para el mundo, de cómo un pueblo decidió un día, salir adelante. https://t.co/dANJsfiThB", "likes": 4470, "retweets": 733}, {"date": "2021-12-03", "text": "Pero si la @AsambleaSV intenta remover a uno de estos corruptos, la “comunidad internacional” empieza a amenazar a nuestro país con sanciones y a acusarnos de “dictadura”.  ¿Entonces qué hacemos? ¿Dejamos que nos sigan matando?", "likes": 4354, "retweets": 847}, {"date": "2021-09-30", "text": "Los angelitos protegidos de las ONG y de una parte de la “Comunidad Internacional”.  Ya me imagino si tolerarían esto en Nueva York.  Y también me imagino las condenas “internacionales”, si nosotros hiciéramos exactamente lo que ellos harían. https://t.co/8R2tTyJzAQ", "likes": 2650, "retweets": 619}, {"date": "2020-02-26", "text": "Un pequeño discurso, ante el presidente del BID, los gobernadores del grupo, invitados especiales y comunidad internacional.  Y los más importante, ante el pueblo salvadoreño. https://t.co/P7kp8vuQb6", "likes": 1791, "retweets": 329}], "(no specific target)": [], "Amnesty / HRW": [{"date": "2020-06-16", "text": "¿A qué hora se pronuncia la @SalaCnalSV por el DESACATO de la @AsambleaSV con la “Ley de Amnistía” y con la ley para permitir ejercer a nuestra diáspora, su derecho CONSTITUCIONAL al voto?  Ambos plazos vencieron.  ¿Y @MelaraRaul se pronunciará o hará “lo que crea conveniente”?", "likes": 15512, "retweets": 2572}, {"date": "2020-02-28", "text": "Es extraño que la crisis internacional generada por los diputados, ayer en la noche, con la aprobación de la “Ley de Amnistía”, casi no ha llegado a los medios en El Salvador.  Como si no hubiera pasado nada. Bien raro.  Abro hilo...", "likes": 5862, "retweets": 1220}, {"date": "2019-05-23", "text": "Anoten los nombres de cada diputado que vote por esta “Ley de Amnistía” express. Recuerden sus caras la próxima vez que les pidan su voto.  Solo legislan para ellos, para   function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/\n/g,'<br>');
  }

  function renderPanel(strat, targ) {
    const tweets = (TWEETS[strat] || {})[targ] || [];
    const panel  = document.getElementById('tweet-panel');
    const header = document.getElementById('panel-header');
    header.textContent = strat + '  →  ' + targ +
                         '  (' + tweets.length + ' tweet' +
                         (tweets.length !== 1 ? 's' : '') + ')';
    const list = document.getElementById('tweet-list');
    list.innerHTML = '';
    if (tweets.length === 0) {
      list.innerHTML = '<li style="color:#888">(no tweets)</li>';
    } else {
      tweets.forEach(function(t) {
        const li = document.createElement('li');
        li.innerHTML =
          '<span class="tw-meta">' + t.date +
          ' &nbsp;·&nbsp; ♥ ' + t.likes.toLocaleString() +
          ' &nbsp;·&nbsp; 🔁 ' + t.retweets.toLocaleString() + '</span><br>' +
          '<span class="tw-text">' + esc(t.text) + '</span>';
        list.appendChild(li);
      });
    }
    panel.style.display = 'block';
    panel.scrollIntoView({behavior: 'smooth', block: 'start'});
  }

  document.addEventListener('DOMContentLoaded', function() {
    const gd = document.querySelector('.js-plotly-plot');
    if (!gd) return;
    gd.on('plotly_click', function(data) {
      const pt = data.points[0];
      renderPanel(pt.y, pt.x);
    });
  });
})();
